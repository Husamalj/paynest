version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Asia/Amman"
    open-pull-requests-limit: 5
    groups:
      next:
        patterns:
          - "next"
          - "@next/*"
      test-tools:
        patterns:
          - "@playwright/*"
          - "vitest"
          - "tsx"
      security-libs:
        patterns:
          - "jose"
          - "jsonwebtoken"
          - "bcryptjs"
          - "zod"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:15"
      timezone: "Asia/Amman"
    open-pull-requests-limit: 5
