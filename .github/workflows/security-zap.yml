name: Security ZAP

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "Staging, preview, or localhost-equivalent URL to scan"
        required: true
        type: string
      fail_on_warn:
        description: "Fail workflow on ZAP warnings"
        required: false
        default: false
        type: boolean
      allow_production:
        description: "Explicitly allow scanning paynest.app production"
        required: false
        default: false
        type: boolean

jobs:
  zap-baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run OWASP ZAP baseline
        env:
          ZAP_TARGET: ${{ inputs.target_url }}
          ZAP_FAIL_ON_WARN: ${{ inputs.fail_on_warn }}
          ZAP_ALLOW_PRODUCTION: ${{ inputs.allow_production }}
        run: npm run zap:baseline

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-baseline-report
          path: zap-report.html
          if-no-files-found: ignore
