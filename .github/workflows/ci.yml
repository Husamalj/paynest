name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: paynest_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      PAYNEST_ALLOW_TEST_DB: "true"
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/paynest_test
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/paynest_test
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/paynest_test
      TEST_DIRECT_URL: postgresql://postgres:postgres@localhost:5432/paynest_test
      JWT_SECRET: test-jwt-secret-change-me
      NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3000
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
      RESEND_API_KEY: test-resend-disabled
      FROM_EMAIL: noreply@example.test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npx prisma db push
      - run: npx playwright install --with-deps chromium
      - run: npm run lint
      - run: npm run check:isolation
      - run: npm run test:e2e
      - run: npm run build

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore
