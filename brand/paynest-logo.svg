<svg width="1180" height="380" viewBox="0 0 1180 380" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="60" y1="40" x2="320" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1AA0F2"/>
      <stop offset="0.55" stop-color="#0C8CE8"/>
      <stop offset="1" stop-color="#075A9E"/>
    </linearGradient>
    <linearGradient id="coin" x1="130" y1="80" x2="250" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E3F1FC"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#04335C" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- icon tile -->
  <g transform="translate(40,40) scale(0.586)">
    <rect x="0" y="0" width="480" height="480" rx="118" fill="url(#bg)"/>
    <g stroke-linecap="round" fill="none" filter="url(#soft)">
      <path d="M101 206 Q256 474 411 206" stroke="#A9D6F7" stroke-width="30"/>
      <path d="M133 212 Q256 430 379 212" stroke="#D6ECFB" stroke-width="26"/>
      <path d="M163 216 Q256 392 349 216" stroke="#FFFFFF" stroke-width="22"/>
    </g>
    <circle cx="256" cy="188" r="80" fill="url(#coin)" filter="url(#soft)"/>
    <circle cx="256" cy="188" r="60" fill="none" stroke="#7CC7FC" stroke-width="7"/>
    <text x="256" y="190" font-family="Segoe UI, Arial, sans-serif" font-size="104" font-weight="800" fill="#0C8CE8" text-anchor="middle" dominant-baseline="central">$</text>
    <ellipse cx="230" cy="156" rx="15" ry="8" fill="#FFFFFF" opacity="0.7" transform="rotate(-30 230 156)"/>
  </g>

  <!-- wordmark -->
  <text x="360" y="232" font-family="Segoe UI, Arial, sans-serif" font-size="150" font-weight="800" letter-spacing="-3">
    <tspan fill="#0A233A">Pay</tspan><tspan fill="#0C8CE8">Nest</tspan>
  </text>
  <text x="364" y="300" font-family="Segoe UI, Arial, sans-serif" font-size="40" font-weight="600" letter-spacing="6" fill="#64748B">PAYROLL &amp; HR</text>
</svg>
